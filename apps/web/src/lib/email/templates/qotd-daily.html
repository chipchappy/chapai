<html>

                <p style="margin:24px 0 0;color:#7A857E;font-size:12px;">Upgrade: <a href="{{site_url}}/pricing" style="color:#3F6F75;">unlock the full bank</a> | <a href="{{unsubscribe_url}}" style="color:#7A857E;">unsubscribe</a></p>
              </td>
