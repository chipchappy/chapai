name: Deploy

on:
  push:
    branches: [main, dev]

jobs:
  deploy-chapai:
    name: Deploy ChapAI Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Guard canonical brain writes
        working-directory: ${{ github.workspace }}
        run: node scripts/ops/guard-canonical-brain-writes.mjs

      - name: Guard no visual drift
        working-directory: ${{ github.workspace }}
        run: node scripts/check-no-visual-drift.mjs --base="${{ github.event.before }}" --head="${{ github.sha }}"

      - name: Build
        run: npm run build:worker
        env:
          NEXT_PUBLIC_APP_URL: https://claritynclex.com
          NEXT_PUBLIC_SUPABASE_URL: https://gciwxmfbradcebxnthos.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-NT7C6FL4J1
          NEXTAUTH_URL: https://claritynclex.com
          APP_ENV: production
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-${{ github.sha }}
          path: |
            apps/web/.next/trace
            apps/web/.next/build-error.log
            apps/web/npm-debug.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Set OPENROUTER_API_KEY → staging
        if: github.ref == 'refs/heads/dev'
        run: echo "${{ secrets.OPENROUTER_API_KEY }}" | npx wrangler secret put OPENROUTER_API_KEY --name chapai-web-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy → STAGING
        if: github.ref == 'refs/heads/dev'
        run: npx wrangler deploy --config wrangler.staging.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set OPENROUTER_API_KEY → production
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.OPENROUTER_API_KEY }}" | npx wrangler secret put OPENROUTER_API_KEY --name chapai-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy → PRODUCTION
        if: github.ref == 'refs/heads/main'
        run: npx wrangler deploy --config wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
