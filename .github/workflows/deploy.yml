name: Deploy

on:
  push:
    branches: [main, dev]

jobs:
  deploy-chapai:
    name: Deploy ChapAI Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Guard canonical brain writes
        working-directory: ${{ github.workspace }}
        run: node scripts/ops/guard-canonical-brain-writes.mjs

      - name: Build
        run: npm run build:worker

      - name: Set OPENROUTER_API_KEY → staging
        if: github.ref == 'refs/heads/dev'
        continue-on-error: true  # secret already set on worker; don't block deploy if token lacks secret-write
        run: echo "${{ secrets.OPENROUTER_API_KEY }}" | npx wrangler secret put OPENROUTER_API_KEY --name chapai-web-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy → STAGING
        if: github.ref == 'refs/heads/dev'
        run: npx wrangler deploy --config wrangler.staging.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set OPENROUTER_API_KEY → production
        if: github.ref == 'refs/heads/main'
        continue-on-error: true  # secret already set on worker; don't block prod deploy if token lacks secret-write
        run: echo "${{ secrets.OPENROUTER_API_KEY }}" | npx wrangler secret put OPENROUTER_API_KEY --name chapai-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy → PRODUCTION
        if: github.ref == 'refs/heads/main'
        run: npx wrangler deploy --config wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
