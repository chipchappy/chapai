name: Deploy Static Sites

on:
  push:
    branches: [main, dev]

jobs:
  deploy-ccrn:
    name: Deploy ClarityCCRN
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy CCRN → staging
        if: github.ref == 'refs/heads/dev'
        run: npx wrangler pages deploy app --project-name clarity-ccrn-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy CCRN → production
        if: github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy app --project-name clarity-ccrn
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-nclex:
    name: Deploy ClarityNCLEX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy NCLEX → staging
        if: github.ref == 'refs/heads/dev'
        run: npx wrangler pages deploy app/nclex --project-name clarity-nclex-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy NCLEX → production
        if: github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy app/nclex --project-name clarity-nclex
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
